services:
  web:
    build:
      context: .
      args:
        HEROUI_AUTH_TOKEN: ${HEROUI_AUTH_TOKEN:-}
    command: npm run start
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RALPH_ADMIN_TOKEN: ${RALPH_ADMIN_TOKEN:-}
      RALPH_RUNNER_ENABLED: ${RALPH_RUNNER_ENABLED:-0}
      RALPH_GIT_WRITE_ENABLED: ${RALPH_GIT_WRITE_ENABLED:-0}
      RALPH_GIT_PUSH_ENABLED: ${RALPH_GIT_PUSH_ENABLED:-0}
      RALPH_GIT_PR_ENABLED: ${RALPH_GIT_PR_ENABLED:-0}
      RALPH_FORBIDDEN_PATHS: ${RALPH_FORBIDDEN_PATHS:-.env,.env.local,.ssh,id_rsa,id_ed25519}
      RALPH_GITHUB_TOKEN: ${RALPH_GITHUB_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
    volumes:
      - ralph-data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        HEROUI_AUTH_TOKEN: ${HEROUI_AUTH_TOKEN:-}
    command: npm run worker
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RALPH_ADMIN_TOKEN: ${RALPH_ADMIN_TOKEN:-}
      RALPH_RUNNER_ENABLED: ${RALPH_RUNNER_ENABLED:-0}
      RALPH_GIT_ENABLED: ${RALPH_GIT_ENABLED:-0}
      RALPH_GIT_WRITE_ENABLED: ${RALPH_GIT_WRITE_ENABLED:-0}
      RALPH_GIT_PUSH_ENABLED: ${RALPH_GIT_PUSH_ENABLED:-0}
      RALPH_GIT_PR_ENABLED: ${RALPH_GIT_PR_ENABLED:-0}
      RALPH_WORKER_INTERVAL_MS: ${RALPH_WORKER_INTERVAL_MS:-5000}
      RALPH_TASK_TIMEOUT_MS: ${RALPH_TASK_TIMEOUT_MS:-1800000}
      RALPH_ALLOWED_REPOS: ${RALPH_ALLOWED_REPOS:-}
      RALPH_ALLOWED_COMMANDS: ${RALPH_ALLOWED_COMMANDS:-yarn lint,yarn typecheck,yarn build}
      RALPH_FORBIDDEN_PATHS: ${RALPH_FORBIDDEN_PATHS:-.env,.env.local,.ssh,id_rsa,id_ed25519}
      RALPH_PROVIDER_CALLS_ENABLED: ${RALPH_PROVIDER_CALLS_ENABLED:-0}
      CODEX_COMMAND: ${CODEX_COMMAND:-codex exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox -}
      OPENCODE_GO_COMMAND: ${OPENCODE_GO_COMMAND:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_API_URL: ${MIMO_API_URL:-}
      MIMO_MODEL: ${MIMO_MODEL:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_API_URL: ${MINIMAX_API_URL:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_API_URL: ${ZAI_API_URL:-}
      ZAI_MODEL: ${ZAI_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      RALPH_GITHUB_TOKEN: ${RALPH_GITHUB_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
    volumes:
      - ralph-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  ralph-data:
